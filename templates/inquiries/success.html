{% extends 'base.html' %}
{% block content %}
<section class="py-32 bg-cream-50 text-center">
  <div class="container mx-auto px-4">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="font-serif text-4xl font-bold text-charcoal-900 mb-4">Quote Request Sent!</h1>
    <p class="text-gray-500 max-w-md mx-auto mb-8">Thank you! Our orders team will review your inquiry and respond within 24 hours with pricing and sample availability.</p>
    <div class="flex flex-wrap gap-4 justify-center">
      <a href="{% url 'core:home' %}" class="bg-sand-600 text-white font-semibold px-8 py-4 rounded-full hover:bg-sand-700 transition-colors">Back to Home</a>
      <a href="https://wa.me/{{ WHATSAPP_NUMBER }}" target="_blank" class="bg-green-600 text-white font-semibold px-8 py-4 rounded-full hover:bg-green-700 transition-colors">WhatsApp Follow Up</a>
    </div>
  </div>
</section>
{% endblock %}
