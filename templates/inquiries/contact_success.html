{% extends 'base.html' %}
{% block content %}
<section class="py-32 bg-cream-50 text-center">
  <div class="container mx-auto px-4">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="font-serif text-4xl font-bold text-charcoal-900 mb-4">Message Sent!</h1>
    <p class="text-gray-500 max-w-md mx-auto mb-8">We'll get back to you shortly. For urgent matters, reach us on WhatsApp.</p>
    <a href="{% url 'core:home' %}" class="bg-sand-600 text-white font-semibold px-8 py-4 rounded-full hover:bg-sand-700 transition-colors">Back to Home</a>
  </div>
</section>
{% endblock %}
