services:
  - type: web
    name: tridav
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tridav-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: tridav.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://tridav.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: tridav-db
    databaseName: tridav
    plan: free
