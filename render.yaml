# Render's own free Postgres plan auto-deletes after 30 days (+14-day grace
# period), so it can't back a real production DB. Use a Neon free Postgres
# project instead (neon.tech — free tier never expires) and paste its
# connection string into DATABASE_URL below, either here or in the Render
# dashboard's env var UI (recommended, so the secret isn't committed to git).
services:
  - type: web
    name: tridav
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # set manually in the Render dashboard to your Neon connection string
      - key: ALLOWED_HOSTS
        value: tridav.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://tridav.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
